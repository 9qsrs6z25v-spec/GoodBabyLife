<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Baby Life - 全平台預覽圖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:linear-gradient(135deg,#FFF0F3,#F5F3FF,#EBF5FB);min-height:100vh;padding:60px 20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:36px;color:#5A4A5A;margin-bottom:8px}
.sub{font-size:16px;color:#8A7A8A;margin-bottom:40px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:1200px;width:100%}
.card{background:#fff;border-radius:24px;padding:32px;text-align:center;box-shadow:0 8px 30px rgba(255,182,193,0.2);transition:all 0.3s;text-decoration:none;color:inherit;border:2px solid transparent}
.card:hover{transform:translateY(-8px);box-shadow:0 16px 50px rgba(255,182,193,0.3);border-color:#FFB6C1}
.card-icon{font-size:64px;margin-bottom:16px}
.card h2{font-size:22px;color:#5A4A5A;margin-bottom:8px}
.card p{font-size:14px;color:#8A7A8A;margin-bottom:4px}
.card .spec{font-size:12px;color:#AED8F0;font-weight:600;margin-top:8px}
.card .count{display:inline-block;margin-top:12px;padding:6px 16px;background:linear-gradient(135deg,#FFB6C1,#E6E6FA);color:#fff;border-radius:20px;font-size:13px;font-weight:600}
</style>
</head>
<body>
<h1>👶 Good Baby Life</h1>
<p class="sub">App Store 全平台預覽圖產生器</p>
<div class="cards">
  <a class="card" href="app-store-previews.html">
    <div class="card-icon">📱</div>
    <h2>iPhone</h2>
    <p>首頁 · 喝奶 · 副食品 · 小建議</p>
    <div class="spec">1290 x 2796 px (6.7")</div>
    <div class="count">4 張預覽圖</div>
  </a>
  <a class="card" href="ipad-previews.html">
    <div class="card-icon">📱</div>
    <h2>iPad</h2>
    <p>儀表板 · 喝奶&副食品 · 小建議</p>
    <div class="spec">2048 x 2732 px (12.9")</div>
    <div class="count">3 張預覽圖</div>
  </a>
  <a class="card" href="watch-previews.html">
    <div class="card-icon">⌚</div>
    <h2>Apple Watch</h2>
    <p>首頁 · 總覽 · 喝奶 · 副食品</p>
    <div class="spec">502 x 410 px (Ultra 2)</div>
    <div class="count">4 張預覽圖</div>
  </a>
  <a class="card" href="tv-previews.html">
    <div class="card-icon">📺</div>
    <h2>Apple TV</h2>
    <p>總覽 · 時間軸 · 小建議</p>
    <div class="spec">1920 x 1080 px (Full HD)</div>
    <div class="count">3 張預覽圖</div>
  </a>
</div>
</body>
</html>
